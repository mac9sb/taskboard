name: CD — Deploy to Azure Container Apps

# Triggered manually or by cd-docker.yml once new images are pushed.
# Requires two secrets set on the target GitHub environment:
#   AZURE_CREDENTIALS — output of: mise run infra:setup:gh-secret
#   GHCR_TOKEN        — GitHub PAT with read:packages scope
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]
      image_tag:
        description: Image tag to deploy (defaults to the triggering commit SHA)
        required: false
        default: latest

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.image_tag }} → ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    env:
      AZURE_RESOURCE_GROUP: taskboard-rg
      IMAGE_REPO: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          [ "$TAG" = "latest" ] && TAG="${{ github.sha }}"
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update backend image
        run: |
          az containerapp update \
            --name taskboard-backend \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE_REPO/backend:${{ steps.tag.outputs.value }}" \
            --output none

      - name: Update frontend image
        run: |
          az containerapp update \
            --name taskboard-frontend \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE_REPO/frontend:${{ steps.tag.outputs.value }}" \
            --output none

      - name: Show live URL
        run: |
          URL=$(az containerapp show \
            --name taskboard-frontend \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query 'properties.configuration.ingress.fqdn' \
            --output tsv)
          echo "### Deployed to https://$URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image tag:** ${{ steps.tag.outputs.value }}" >> "$GITHUB_STEP_SUMMARY"
