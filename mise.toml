[tools]
node = "22"
dotnet = "9"
azure-cli = "latest"
uv = "latest"
kubeconform = "latest"
kube-linter = "latest"

[hooks]
postinstall = "npm --prefix frontend ci"

# ─── Local dev ───

[tasks.backend]
description = "Start backend locally (in-memory store)"
dir = "backend"
run = "dotnet run"

[tasks.frontend]
description = "Start frontend dev server locally"
dir = "frontend"
run = "npm run dev"

[tasks.dev]
description = "Start backend + frontend locally using in-memory store"
run = """
#!/usr/bin/env bash

BACKEND_PID=""
FRONTEND_PID=""

cleanup() {
  echo ""
  echo "◼ Shutting down..."
  [ -n "$BACKEND_PID" ]  && kill "$BACKEND_PID"  2>/dev/null || true
  [ -n "$FRONTEND_PID" ] && kill "$FRONTEND_PID" 2>/dev/null || true
}
trap cleanup EXIT INT TERM

(cd backend && dotnet run) &
BACKEND_PID=$!

(cd frontend && npm run dev) &
FRONTEND_PID=$!

echo ""
echo "  Backend  → http://localhost:5000"
echo "  Frontend → http://localhost:5173"
echo ""
echo "Press Ctrl+C to stop."
wait
"""

# ─── Kubernetes ───

[tasks."k8s:context"]
description = "Verify kubectl is configured and print the active context"
run = """
#!/usr/bin/env bash
if ! kubectl config current-context &>/dev/null; then
  echo "✗ No active kubectl context found."
  echo "  → Configure your kubeconfig and try again."
  exit 1
fi
echo "✔ Context: $(kubectl config current-context)"
"""

[tasks."k8s:build"]
description = "Build backend and frontend Docker images"
run = """
#!/usr/bin/env bash
set -e
echo "▶ Building backend..."
docker build -t taskboard/backend:latest backend/

echo "▶ Building frontend..."
docker build -t taskboard/frontend:latest frontend/

echo "✔ Images built."
"""

[tasks."k8s:deploy"]
description = "Full deploy to Kubernetes (Cosmos DB + backend + frontend)"
run = """
#!/usr/bin/env bash
set -e

mise run k8s:context
mise run k8s:build

echo "▶ Applying manifests..."
kubectl apply -f k8s/namespace.yaml
kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/taskboard --timeout=30s
kubectl apply -f k8s/

echo ""
echo "▶ Waiting for Cosmos DB to be ready (this can take a while on first pull)..."
kubectl rollout status deployment/cosmosdb -n taskboard --timeout=360s

echo "▶ Waiting for backend to be ready..."
kubectl rollout status deployment/taskboard-backend -n taskboard --timeout=120s

echo "▶ Waiting for frontend to be ready..."
kubectl rollout status deployment/taskboard-frontend -n taskboard --timeout=60s

echo ""
echo "✔ Deployed. Run: mise run k8s:open"
"""

[tasks."k8s:open"]
description = "Port-forward frontend to http://localhost:8080 (no rebuild — use k8s:up to rebuild first)"
run = """
#!/usr/bin/env bash
set -e
mise run k8s:context

if ! kubectl get namespace taskboard &>/dev/null; then
  echo "▶ Namespace not found — running k8s:deploy first..."
  mise run k8s:deploy
fi

echo "  App → http://localhost:8080"
kubectl port-forward -n taskboard svc/taskboard-frontend 8080:80
"""

[tasks."k8s:up"]
description = "Rebuild images, force-restart pods, then port-forward to http://localhost:8080"
run = """
#!/usr/bin/env bash
set -e
mise run k8s:context
mise run k8s:build

echo "▶ Applying manifests..."
kubectl apply -f k8s/namespace.yaml
kubectl wait --for=jsonpath='{.status.phase}'=Active namespace/taskboard --timeout=30s
kubectl apply -f k8s/

echo "▶ Waiting for Cosmos DB..."
kubectl rollout status deployment/cosmosdb -n taskboard --timeout=360s

echo "▶ Force-restarting backend and frontend with new images..."
kubectl rollout restart deployment/taskboard-backend deployment/taskboard-frontend -n taskboard

echo "▶ Waiting for backend..."
kubectl rollout status deployment/taskboard-backend -n taskboard --timeout=120s

echo "▶ Waiting for frontend..."
kubectl rollout status deployment/taskboard-frontend -n taskboard --timeout=60s

echo ""
echo "  App → http://localhost:8080"
kubectl port-forward -n taskboard svc/taskboard-frontend 8080:80
"""

[tasks."k8s:status"]
description = "Show pods, services, and deployments in the taskboard namespace"
run = """
#!/usr/bin/env bash
mise run k8s:context
kubectl get deployments,pods,services -n taskboard
"""

[tasks."k8s:logs"]
description = "Follow backend pod logs"
run = """
#!/usr/bin/env bash
mise run k8s:context
kubectl logs -n taskboard -l app=taskboard-backend -f --max-log-requests=3
"""

[tasks."k8s:restart"]
description = "Rolling restart of backend and frontend deployments"
run = """
#!/usr/bin/env bash
mise run k8s:context
kubectl rollout restart deployment/taskboard-backend deployment/taskboard-frontend -n taskboard
"""

[tasks."k8s:teardown"]
description = "Remove all TaskBoard resources from the cluster"
run = """
#!/usr/bin/env bash
mise run k8s:context
kubectl delete -f k8s/ --ignore-not-found
echo "✔ Torn down."
"""

# ─── CI checks ───

[tasks.lint]
description = "Lint frontend TypeScript with ESLint"
dir = "frontend"
run = "npm run lint"

[tasks.typecheck]
description = "Type-check frontend TypeScript (no emit)"
dir = "frontend"
run = "npm run typecheck"

[tasks.format]
description = "Auto-fix backend C# formatting"
dir = "backend"
run = "dotnet format"

[tasks."format:check"]
description = "Verify backend C# formatting is clean (CI gate — fails if changes needed)"
dir = "backend"
run = "dotnet format --verify-no-changes"

[tasks."test:frontend"]
description = "Run frontend Vitest tests"
dir = "frontend"
run = "npm test"

[tasks."test:backend"]
description = "Run backend xUnit integration tests"
run = "dotnet test backend.Tests/TaskBoard.Api.Tests.csproj --configuration Release --verbosity normal"

[tasks.test]
description = "Run all tests (frontend + backend in parallel)"
depends = ["test:frontend", "test:backend"]

[tasks."check:k8s"]
description = "Validate and lint Kubernetes manifests"
run = """
#!/usr/bin/env bash
set -e
kubeconform -strict -summary -kubernetes-version 1.31.0 k8s/
kube-linter lint --config .kube-linter.yaml k8s/
echo "✔ K8s manifests OK."
"""

[tasks.ci]
description = "Run all CI checks — matches the GitHub Actions pipeline exactly"
depends = ["lint", "typecheck", "format:check", "test:frontend", "test:backend", "check:k8s"]

# ─── Azure infra ───
# Copy .env.example → .env and fill in values before running these tasks.

[tasks."infra:up"]
description = "Provision Azure infra (Container Apps + Cosmos DB) — idempotent, safe to re-run"
run = """
#!/usr/bin/env bash
set -e
RG=${AZURE_RESOURCE_GROUP:-taskboard-rg}
LOCATION=${AZURE_LOCATION:-eastus}

echo "▶ Installing Bicep..."
az bicep install --only-show-errors

echo "▶ Ensuring resource group '$RG' in $LOCATION..."
az group create --name "$RG" --location "$LOCATION" --output none

echo "▶ Deploying Bicep template (this takes ~3 min on first run)..."
OUTPUTS=$(az deployment group create \
  --resource-group "$RG" \
  --name taskboard \
  --template-file infra/main.bicep \
  --parameters location="$LOCATION" ghcrToken="$GHCR_TOKEN" \
  --query 'properties.outputs' \
  --output json)

FRONTEND_URL=$(echo "$OUTPUTS" | python3 -c "import sys,json; print(json.load(sys.stdin)['frontendUrl']['value'])")
echo ""
echo "✔ Deployed!"
echo "  → $FRONTEND_URL"
"""

[tasks."infra:deploy"]
description = "Fast deploy: update Container Apps to a new image tag (IMAGE_TAG=<sha>)"
run = """
#!/usr/bin/env bash
set -e
RG=${AZURE_RESOURCE_GROUP:-taskboard-rg}
TAG=${IMAGE_TAG:-latest}
REPO=ghcr.io/mac9sb/taskboard

echo "▶ Deploying $TAG to backend..."
az containerapp update --name taskboard-backend --resource-group "$RG" \
  --image "$REPO/backend:$TAG" --output none

echo "▶ Deploying $TAG to frontend..."
az containerapp update --name taskboard-frontend --resource-group "$RG" \
  --image "$REPO/frontend:$TAG" --output none

echo "✔ Deployed $TAG."
"""

[tasks."infra:status"]
description = "Show live Container App URLs and replica counts"
run = """
#!/usr/bin/env bash
RG=${AZURE_RESOURCE_GROUP:-taskboard-rg}
echo "=== Container Apps ==="
az containerapp list --resource-group "$RG" \
  --query '[].{Name:name,URL:properties.configuration.ingress.fqdn,Min:properties.template.scale.minReplicas,Max:properties.template.scale.maxReplicas}' \
  --output table
echo ""
echo "=== Cosmos DB ==="
az cosmosdb list --resource-group "$RG" \
  --query '[].{Name:name,Location:location,Serverless:properties.capabilities[0].name}' \
  --output table
"""

[tasks."infra:logs:backend"]
description = "Stream backend Container App logs"
run = """
#!/usr/bin/env bash
az containerapp logs show \
  --name taskboard-backend \
  --resource-group "${AZURE_RESOURCE_GROUP:-taskboard-rg}" \
  --follow --tail 50
"""

[tasks."infra:logs:frontend"]
description = "Stream frontend Container App logs"
run = """
#!/usr/bin/env bash
az containerapp logs show \
  --name taskboard-frontend \
  --resource-group "${AZURE_RESOURCE_GROUP:-taskboard-rg}" \
  --follow --tail 50
"""

[tasks."infra:down"]
description = "Delete all Azure resources — ⚠ destructive and irreversible"
run = """
#!/usr/bin/env bash
RG=${AZURE_RESOURCE_GROUP:-taskboard-rg}
echo "⚠  This will permanently delete resource group '$RG' and everything in it."
read -p "Type the resource group name to confirm: " CONFIRM
if [[ "$CONFIRM" == "$RG" ]]; then
  az group delete --name "$RG" --yes --no-wait
  echo "✔ Deletion initiated."
else
  echo "Cancelled."
fi
"""
