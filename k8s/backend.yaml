apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskboard-backend
  namespace: taskboard
  labels:
    app: taskboard-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskboard-backend
  template:
    metadata:
      labels:
        app: taskboard-backend
    spec:
      containers:
        - name: api
          image: taskboard/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: UseInMemoryStore
              valueFrom:
                configMapKeyRef:
                  name: taskboard-config
                  key: UseInMemoryStore
            - name: CosmosDb__DatabaseName
              valueFrom:
                configMapKeyRef:
                  name: taskboard-config
                  key: CosmosDb__DatabaseName
            - name: CosmosDb__DisableSslVerification
              valueFrom:
                configMapKeyRef:
                  name: taskboard-config
                  key: CosmosDb__DisableSslVerification
            - name: CosmosDb__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: cosmosdb-secret
                  key: connection-string
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/projects
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/projects
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: taskboard-backend
  namespace: taskboard
spec:
  selector:
    app: taskboard-backend
  ports:
    - port: 80
      targetPort: 8080
