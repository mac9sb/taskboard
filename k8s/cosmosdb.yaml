apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosmosdb
  namespace: taskboard
  labels:
    app: cosmosdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cosmosdb
  template:
    metadata:
      labels:
        app: cosmosdb
    spec:
      containers:
        - name: cosmosdb
          # vnext-preview has arm64 support (required for Apple Silicon)
          image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: cosmosdb
  namespace: taskboard
spec:
  selector:
    app: cosmosdb
  ports:
    - port: 8081
      targetPort: 8081
